<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Mini Online Judge</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background: #111827;
            color: #e5e7eb;
        }

        h1 {
            margin-bottom: 10px;
            color: #f9fafb;
        }

        h2 {
            color: #f9fafb;
        }

        .version-badge {
            display: inline-block;
            margin-left: 12px;
            padding: 4px 10px;
            font-size: 14px;
            border-radius: 999px;
            background: #374151;
            color: #e5e7eb;
            vertical-align: middle;
        }

        .version-badge.develop {
            background: #7c2d12;
            color: #fed7aa;
        }

        .version-badge.release {
            background: #064e3b;
            color: #a7f3d0;
        }

        .version-badge.local {
            background: #374151;
            color: #e5e7eb;
        }

        .top-bar {
            margin-bottom: 15px;
        }

        select, button {
            padding: 8px 12px;
            font-size: 15px;
            background: #1f2937;
            color: #e5e7eb;
            border: 1px solid #374151;
            border-radius: 6px;
        }

        button {
            cursor: pointer;
            margin-left: 10px;
        }

        button:hover {
            background: #374151;
        }

        .container {
            display: grid;
            grid-template-columns: 1.5fr 1fr;
            gap: 20px;
        }

        .panel {
            background: #1f2937;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #374151;
        }

        textarea {
            width: 100%;
            box-sizing: border-box;
            font-family: Consolas, monospace;
            font-size: 14px;
            padding: 10px;
            resize: vertical;
            background: #111827;
            color: #e5e7eb;
            border: 1px solid #374151;
            border-radius: 6px;
        }

        #editor {
            height: 430px;
            border: 1px solid #374151;
            font-size: 14px;
        }

        .cm-editor {
            height: 100%;
        }

        .cm-scroller {
            font-family: Consolas, monospace;
        }

        #input, #answer {
            height: 120px;
        }

        pre {
            background: #030712;
            color: #e5e7eb;
            padding: 15px;
            min-height: 180px;
            white-space: pre-wrap;
            overflow-x: auto;
            border-radius: 6px;
            border: 1px solid #374151;
        }

        .status {
            font-weight: bold;
            margin-bottom: 10px;
            color: #93c5fd;
        }

        .problem-meta {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .problem-meta div {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .problem-meta label {
            font-weight: bold;
            color: #e5e7eb;
        }

        .problem-meta input {
            padding: 10px;
            font-size: 14px;
            font-family: Arial, sans-serif;
            box-sizing: border-box;
            background: #111827;
            color: #e5e7eb;
            border: 1px solid #374151;
            border-radius: 6px;
        }

        .statement-panel {
            background: #1f2937;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #374151;
            margin-bottom: 20px;
        }

        #problemStatement {
            height: 120px;
        }
    </style>
</head>

<body>
    <h1>
        Mini Online Judge
        <span id="versionBadge" class="version-badge local">Loading...</span>
    </h1>

    <div class="top-bar">
        <label>Language:</label>
        <select id="language" onchange="changeTemplate()">
            <option value="cpp">C++17</option>
            <option value="c">C11</option>
            <option value="python">Python 3</option>
        </select>

        <button onclick="runCode()">Run</button>
        <button onclick="resetPage()">Reset</button>
        <button onclick="saveProblem()">Save</button>
    </div>

    <div class="problem-meta">
        <div>
            <label>Problem ID</label>
            <input id="problemId" type="text" placeholder="e.g. UVA100">
        </div>

        <div>
            <label>Problem Title</label>
            <input id="problemTitle" type="text" placeholder="e.g. The 3n + 1 problem">
        </div>
    </div>

    <div class="statement-panel">
        <h2>Problem Statement</h2>
        <textarea id="problemStatement" placeholder="Write or paste the problem statement here..."></textarea>
    </div>

    <div class="container">
        <div class="panel">
            <h2>Code</h2>
            <div id="editor"></div>
        </div>

        <div class="panel">
            <h2>Input</h2>
            <textarea id="input">3 5</textarea>

            <h2>Expected Output</h2>
            <textarea id="answer">8</textarea>

            <h2>Result</h2>
            <div class="status" id="status">Status: Not Run</div>
            <pre id="output">Press Run...</pre>
        </div>
    </div>

    <script type="module">
        import { basicSetup } from "https://esm.sh/codemirror";
        import { EditorView, keymap } from "https://esm.sh/@codemirror/view";
        import { Compartment } from "https://esm.sh/@codemirror/state";
        import { cpp } from "https://esm.sh/@codemirror/lang-cpp";
        import { python } from "https://esm.sh/@codemirror/lang-python";
        import { indentWithTab } from "https://esm.sh/@codemirror/commands";
        import { bracketMatching, indentUnit } from "https://esm.sh/@codemirror/language";
        import { closeBrackets, closeBracketsKeymap } from "https://esm.sh/@codemirror/autocomplete";

        const cppTemplate = `#include <bits/stdc++.h>
using namespace std;

int main() {
    int a, b;
    cin >> a >> b;
    cout << a + b << endl;
    return 0;
}
`;

        const cTemplate = `#include <stdio.h>

int main() {
    int a, b;
    scanf("%d %d", &a, &b);
    printf("%d\\n", a + b);
    return 0;
}
`;

        const pythonTemplate = `a, b = map(int, input().split())
print(a + b)
`;

        const templates = {
            cpp: cppTemplate,
            c: cTemplate,
            python: pythonTemplate
        };

        const defaultInput = "3 5";
        const defaultAnswer = "8";
        const defaultProblemId = "";
        const defaultProblemTitle = "";
        const defaultProblemStatement = "";
        const defaultLanguage = "cpp";

        const languageExtensions = {
            cpp: cpp(),
            c: cpp(),
            python: python()
        };

        const languageMode = new Compartment();

        const editor = new EditorView({
            doc: cppTemplate,
            extensions: [
                basicSetup,
                languageMode.of(languageExtensions.cpp),
                indentUnit.of("    "),
                closeBrackets(),
                bracketMatching(),
                keymap.of([
                    indentWithTab,
                    ...closeBracketsKeymap
                ])
            ],
            parent: document.getElementById("editor")
        });

        async function loadAppInfo() {
            const badge = document.getElementById("versionBadge");

            try {
                const response = await fetch("/api/app-info");
                const info = await response.json();

                badge.textContent = `${info.appLabel} :${info.port}`;

                badge.classList.remove("develop", "release", "local");

                if (info.appEnv === "develop") {
                    badge.classList.add("develop");
                } else if (info.appEnv === "release") {
                    badge.classList.add("release");
                } else {
                    badge.classList.add("local");
                }
            } catch (err) {
                badge.textContent = "Unknown Version";
                badge.classList.remove("develop", "release");
                badge.classList.add("local");
            }
        }

        loadAppInfo();

        window.changeTemplate = function () {
            const language = document.getElementById("language").value;
            const template = templates[language];

            editor.dispatch({
                changes: {
                    from: 0,
                    to: editor.state.doc.length,
                    insert: template
                },
                effects: languageMode.reconfigure(languageExtensions[language])
            });

            editor.focus();
        };

        window.resetPage = function () {
            const languageSelect = document.getElementById("language");

            languageSelect.value = defaultLanguage;

            editor.dispatch({
                changes: {
                    from: 0,
                    to: editor.state.doc.length,
                    insert: templates[defaultLanguage]
                },
                effects: languageMode.reconfigure(languageExtensions[defaultLanguage])
            });

            document.getElementById("problemId").value = defaultProblemId;
            document.getElementById("problemTitle").value = defaultProblemTitle;
            document.getElementById("problemStatement").value = defaultProblemStatement;

            document.getElementById("input").value = defaultInput;
            document.getElementById("answer").value = defaultAnswer;

            document.getElementById("status").textContent = "Status: Not Run";
            document.getElementById("output").textContent = "Press Run...";

            editor.focus();
        };

        window.saveProblem = async function () {
            const problemId = document.getElementById("problemId").value;
            const problemTitle = document.getElementById("problemTitle").value;
            const problemStatement = document.getElementById("problemStatement").value;

            const language = document.getElementById("language").value;
            const code = editor.state.doc.toString();
            const input = document.getElementById("input").value;
            const answer = document.getElementById("answer").value;

            const statusBox = document.getElementById("status");
            const outputBox = document.getElementById("output");

            if (!problemId.trim()) {
                statusBox.textContent = "Status: Save Failed";
                outputBox.textContent = "Problem ID is required.";
                return;
            }

            if (!problemTitle.trim()) {
                statusBox.textContent = "Status: Save Failed";
                outputBox.textContent = "Problem title is required.";
                return;
            }

            statusBox.textContent = "Status: Saving...";
            outputBox.textContent = "Saving problem...";

            try {
                const response = await fetch("/api/problems/save", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        problemId,
                        problemTitle,
                        problemStatement,
                        language,
                        code,
                        input,
                        answer
                    })
                });

                const result = await response.json();

                if (!result.ok) {
                    statusBox.textContent = "Status: Save Failed";
                    outputBox.textContent = result.message || "Save failed.";
                    return;
                }

                statusBox.textContent = "Status: Saved";
                outputBox.textContent =
                    `Saved successfully\n` +
                    `Problem ID: ${result.problem.problemId}\n` +
                    `Title: ${result.problem.problemTitle}\n` +
                    `Updated At: ${result.problem.updatedAt}\n`;
            } catch (err) {
                statusBox.textContent = "Status: Save Failed";
                outputBox.textContent = err.toString();
            }
        };

        window.runCode = async function () {
            const code = editor.state.doc.toString();
            const input = document.getElementById("input").value;
            const answer = document.getElementById("answer").value;
            const language = document.getElementById("language").value;

            const statusBox = document.getElementById("status");
            const outputBox = document.getElementById("output");

            statusBox.textContent = "Status: Running...";
            outputBox.textContent = "Running...";

            try {
                const response = await fetch("/api/run", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        code,
                        input,
                        answer,
                        language
                    })
                });

                const result = await response.json();

                statusBox.textContent =
                    `Status: ${result.status} | Time: ${result.timeMs || 0} ms`;

                let text = "";

                if (result.message) {
                    text += result.message + "\n";
                }

                if (result.stdout) {
                    text += "===== stdout =====\n";
                    text += result.stdout + "\n";
                }

                if (result.stderr) {
                    text += "===== stderr =====\n";
                    text += result.stderr + "\n";
                }

                if (!text.trim()) {
                    text = "No output.";
                }

                outputBox.textContent = text;
            } catch (err) {
                statusBox.textContent = "Status: Request Failed";
                outputBox.textContent = err.toString();
            }
        };
    </script>
</body>
</html>
