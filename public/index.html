<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Mini Online Judge</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background: #111827;
            color: #e5e7eb;
        }

        h1 {
            margin-bottom: 10px;
            color: #f9fafb;
        }

        h2 {
            color: #f9fafb;
        }

        .version-badge {
            display: inline-block;
            margin-left: 12px;
            padding: 4px 10px;
            font-size: 14px;
            border-radius: 999px;
            background: #374151;
            color: #e5e7eb;
            vertical-align: middle;
        }

        .version-badge.develop {
            background: #7c2d12;
            color: #fed7aa;
        }

        .version-badge.release {
            background: #064e3b;
            color: #a7f3d0;
        }

        .version-badge.local {
            background: #374151;
            color: #e5e7eb;
        }

        .top-bar {
            margin-bottom: 15px;
        }

        select, button {
            padding: 8px 12px;
            font-size: 15px;
            background: #1f2937;
            color: #e5e7eb;
            border: 1px solid #374151;
            border-radius: 6px;
        }

        button {
            cursor: pointer;
            margin-left: 10px;
        }

        button:hover {
            background: #374151;
        }

        .container {
            display: grid;
            grid-template-columns: 1.5fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .panel {
            background: #1f2937;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #374151;
        }

        textarea {
            width: 100%;
            box-sizing: border-box;
            font-family: Consolas, monospace;
            font-size: 14px;
            padding: 10px;
            resize: vertical;
            background: #111827;
            color: #e5e7eb;
            border: 1px solid #374151;
            border-radius: 6px;
        }

        input {
            padding: 10px;
            font-size: 14px;
            font-family: Arial, sans-serif;
            box-sizing: border-box;
            background: #111827;
            color: #e5e7eb;
            border: 1px solid #374151;
            border-radius: 6px;
        }

        #editor {
            height: 430px;
            border: 1px solid #374151;
            font-size: 14px;
        }

        .cm-editor {
            height: 100%;
        }

        .cm-scroller {
            font-family: Consolas, monospace;
        }

        #input, #answer {
            height: 120px;
        }

        pre {
            background: #030712;
            color: #e5e7eb;
            padding: 15px;
            min-height: 180px;
            white-space: pre-wrap;
            overflow-x: auto;
            border-radius: 6px;
            border: 1px solid #374151;
        }

        .status {
            font-weight: bold;
            margin-bottom: 10px;
            color: #93c5fd;
        }

        .problem-meta {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .problem-meta div {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .problem-meta label {
            font-weight: bold;
            color: #e5e7eb;
        }

        .statement-panel {
            background: #1f2937;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #374151;
            margin-bottom: 20px;
        }

        #problemStatement {
            height: 120px;
        }

        .history-panel {
            background: #1f2937;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #374151;
            margin-bottom: 20px;
        }

        .history-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }

        .history-header h2 {
            margin: 0;
        }

        .problem-list {
            margin-top: 12px;
            display: grid;
            gap: 8px;
        }

        .problem-item {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 10px;
            align-items: center;
            padding: 10px;
            background: #111827;
            border: 1px solid #374151;
            border-radius: 6px;
        }

        .problem-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .problem-name {
            font-weight: bold;
            color: #f9fafb;
        }

        .problem-meta-small {
            font-size: 13px;
            color: #9ca3af;
        }

        .empty-history {
            color: #9ca3af;
            font-style: italic;
        }

        .modal-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.65);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 999;
        }

        .modal-backdrop.show {
            display: flex;
        }

        .modal {
            width: min(1000px, 92vw);
            background: #1f2937;
            border: 1px solid #374151;
            border-radius: 10px;
            padding: 18px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 12px;
        }

        .modal-header h2 {
            margin: 0;
        }

        .modal-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
        }

        #rawProblemText {
            height: 360px;
            font-family: Consolas, monospace;
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 12px;
        }

        .hint {
            color: #9ca3af;
            font-size: 13px;
            margin-bottom: 8px;
        }
    </style>
</head>

<body>
    <h1>
        Mini Online Judge
        <span id="versionBadge" class="version-badge local">Loading...</span>
    </h1>

    <div class="top-bar">
        <label>Language:</label>
        <select id="language" onchange="changeTemplate()">
            <option value="cpp">C++17</option>
            <option value="c">C11</option>
            <option value="python">Python 3</option>
        </select>

        <button onclick="runCode()">Run</button>
        <button onclick="resetPage()">Reset</button>
        <button onclick="openImportModal()">+ Import</button>
        <button onclick="saveProblem()">Save</button>
    </div>

    <div class="problem-meta">
        <div>
            <label>Problem ID</label>
            <input id="problemId" type="text" placeholder="e.g. mergesort">
        </div>

        <div>
            <label>Problem Title</label>
            <input id="problemTitle" type="text" placeholder="e.g. Merge Sort Problem">
        </div>
    </div>

    <div class="statement-panel">
        <h2>Problem Statement</h2>
        <textarea id="problemStatement" placeholder="Write or paste the problem statement here..."></textarea>
    </div>

    <div class="container">
        <div class="panel">
            <h2>Code</h2>
            <div id="editor"></div>
        </div>

        <div class="panel">
            <h2>Input</h2>
            <textarea id="input">3 5</textarea>

            <h2>Expected Output</h2>
            <textarea id="answer">8</textarea>

            <h2>Result</h2>
            <div class="status" id="status">Status: Not Run</div>
            <pre id="output">Press Run...</pre>
        </div>
    </div>

    <div class="history-panel">
        <div class="history-header">
            <h2>Saved Problems</h2>
            <button onclick="loadProblemList()">Refresh</button>
        </div>

        <div id="problemList" class="problem-list">
            <div class="empty-history">Loading saved problems...</div>
        </div>
    </div>

    <div id="importModal" class="modal-backdrop">
        <div class="modal">
            <div class="modal-header">
                <h2>Import Problem</h2>
                <button onclick="closeImportModal()">Close</button>
            </div>

            <div class="modal-row">
                <label>Source:</label>
                <select id="importSource">
                    <option value="nthu">NTHU AdaLab</option>
                </select>
            </div>

            <div class="hint">
                Copy the whole problem text from NTHU AdaLab, paste it here, then press Load.
            </div>

            <textarea id="rawProblemText" placeholder="Paste problem text here..."></textarea>

            <div class="modal-actions">
                <button onclick="clearImportText()">Clear</button>
                <button onclick="importProblemFromText()">Load</button>
            </div>
        </div>
    </div>

    <script type="module" src="/app.js"></script>
</body>
</html>
